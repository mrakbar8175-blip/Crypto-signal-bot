name: Crypto News & Trends (Every 4 Hours)

on:
  schedule:
    # Runs every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  fetch-crypto-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # We need feedparser for RSS feeds
          pip install requests feedparser

      - name: Run Crypto News Bot
        env:
          CRYPTO_NEWS_WEBHOOK: ${{ secrets.CRYPTO_NEWS_WEBHOOK }}
        run: python crypto_news_bot.py

      - name: Commit and push state file
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          if [ -f sent_crypto_news.json ]; then
            git add sent_crypto_news.json
            if git commit -m "Update crypto news state"; then
              git push
            else
              echo "No changes to commit."
            fi
          else
            echo "No state file found yet."
          fi
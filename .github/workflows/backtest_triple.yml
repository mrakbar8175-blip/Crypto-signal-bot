name: Triple Filter Backtest

on:
  workflow_dispatch:   # manual trigger

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ccxt pandas numpy pyarrow

      - name: Cache KuCoin data
        uses: actions/cache@v4
        id: cache-data
        with:
          path: kucoin_data_backtest
          key: kucoin-backtest-${{ github.run_week }}

      - name: Run backtest
        run: python backtest_triple_filter.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            backtest_summary.txt
            backtest_trades.csv
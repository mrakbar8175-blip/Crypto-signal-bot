name: Crypto Signal Every Hour

on:
  schedule:
    - cron: '0 * * * *'          # hourly
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}    # if using DeepSeek
          # GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}         # if using Groq
        run: python crypto_ai.py

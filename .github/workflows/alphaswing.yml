name: AlphaSwing - Crypto Signal Generator

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'What do you want to do?'
        required: true
        default: 'signals'
        type: choice
        options:
          - signals
          - monitor
          - add-last-signal
          - list-trades
          - remove-trade
          - report
      symbol:
        description: 'Symbol to remove (for remove-trade mode)'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - run: pip install -r requirements.txt
      
      - run: |
          MODE="${{ github.event.inputs.mode }}"
          SYMBOL="${{ github.event.inputs.symbol }}"
          
          if [ "$MODE" = "signals" ]; then
            python alphaswing.py
          elif [ "$MODE" = "remove-trade" ] && [ -n "$SYMBOL" ]; then
            python alphaswing.py --remove-trade "$SYMBOL"
          else
            python alphaswing.py --$MODE
          fi
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      
      - if: always()
        run: |
          git config user.name "AlphaSwing Bot"
          git config user.email "bot@alphaswing.local"
          git add *.json *.csv *.txt 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "📊 Data update $(date -u +%H:%M)" && git push)
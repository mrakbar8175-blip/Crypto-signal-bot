name: AlphaSwing - Crypto Signal Generator

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'signals'
        type: choice
        options:
          - signals
          - monitor
          - add-last-signal
          - list-trades
          - report
      symbol:
        description: 'Symbol (for add-trade/remove-trade)'
        required: false
        default: ''
      direction:
        description: 'Direction LONG/SHORT (for add-trade)'
        required: false
        default: 'LONG'
      entry:
        description: 'Entry price (for add-trade)'
        required: false
        default: ''
      stop:
        description: 'Stop price (for add-trade)'
        required: false
        default: ''

concurrency:
  group: alphaswing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-alphaswing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AlphaSwing
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          SYMBOL="${{ github.event.inputs.symbol }}"
          DIRECTION="${{ github.event.inputs.direction }}"
          ENTRY="${{ github.event.inputs.entry }}"
          STOP="${{ github.event.inputs.stop }}"
          
          if [ "$MODE" = "monitor" ]; then
            python alphaswing.py --monitor
          elif [ "$MODE" = "add-last-signal" ]; then
            python alphaswing.py --add-last-signal
          elif [ "$MODE" = "list-trades" ]; then
            python alphaswing.py --list-trades
          elif [ "$MODE" = "report" ]; then
            python alphaswing.py --report
          else
            python alphaswing.py
          fi

      - name: Commit and push data files
        if: always()
        run: |
          git config user.name "AlphaSwing Bot"
          git config user.email "bot@alphaswing.local"
          git add portfolio.json open_trades.json signal_log.csv trade_results.csv perf_counter.txt 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "📊 AlphaSwing data update - $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)
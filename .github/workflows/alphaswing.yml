name: AlphaSwing - Crypto Signal Generator

on:
  # Run every 4 hours
  schedule:
    - cron: '0 */4 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'signals'
        type: choice
        options:
          - signals
          - monitor
          - loop

concurrency:
  group: alphaswing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-alphaswing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AlphaSwing
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "monitor" ]; then
            python alphaswing.py --monitor
          elif [ "${{ github.event.inputs.mode }}" = "loop" ]; then
            python alphaswing.py --loop &
            PID=$!
            sleep 120
            kill $PID 2>/dev/null || true
          else
            python alphaswing.py
          fi

      - name: Commit and push data files
        if: always()
        run: |
          git config user.name "AlphaSwing Bot"
          git config user.email "bot@alphaswing.local"
          git add portfolio.json open_trades.json signal_log.csv trade_results.csv perf_counter.txt 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "📊 AlphaSwing data update - $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)